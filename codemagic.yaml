workflows:
  build-ios:
    name: Build iOS
    instance_type: mac_mini_m2
    environment:
      xcode: 26.0
    scripts:
      - cd CoinFlow && python3 scripts/gen_xcodeproj.py
      - cd CoinFlow && xcodebuild build -project CoinFlow.xcodeproj -scheme CoinFlow -configuration Release -destination "generic/platform=iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED="NO" CODE_SIGNING_ALLOWED="NO"
      - |
        cd CoinFlow
        APP=$(find ~/Library/Developer/Xcode/DerivedData -name "CoinFlow.app" -type d | head -1)
        mkdir -p output/Payload
        cp -R "$APP" output/Payload/
        cd output
        zip -q -r CoinFlow.ipa Payload/
    artifacts:
      - CoinFlow/output/CoinFlow.ipa
