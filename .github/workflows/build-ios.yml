name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - unsigned (Simulator .app)
          - signed (Device .ipa)
        default: 'unsigned (Simulator .app)'

env:
  PROJECT: CoinFlow.xcodeproj
  SCHEME: CoinFlow
  DEPLOYMENT_TARGET: '16.0'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Generate .xcodeproj ──────────────────────────────────
      - name: Generate Xcode project
        working-directory: CoinFlow
        run: python3 scripts/gen_xcodeproj.py

      # ── Resolve SPM dependencies ─────────────────────────────
      - name: Resolve Swift packages
        working-directory: CoinFlow
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      # ===================================================================
      # Mode A: Unsigned Simulator Build (no signing required)
      # ===================================================================
      - name: Build for Simulator (unsigned)
        if: github.event.inputs.build_type != 'signed (Device .ipa)'
        working-directory: CoinFlow
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app for Simulator
        if: github.event.inputs.build_type != 'signed (Device .ipa)'
        working-directory: CoinFlow
        run: |
          APP_PATH=$(find ./DerivedData/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -1)
          if [ -d "$APP_PATH" ]; then
            mkdir -p ./output
            cp -R "$APP_PATH" ./output/
            echo "✅ App packaged: $APP_PATH"
          else
            echo "❌ .app not found"
            find ./DerivedData -name "*.app" -type d || true
            exit 1
          fi

      # ===================================================================
      # Mode B: Signed Device IPA (requires GitHub Secrets)
      # ===================================================================
      - name: Set up code signing
        if: github.event.inputs.build_type == 'signed (Device .ipa)'
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          # Create temp keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the key
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/["]//g')

          # Decode and install provisioning profile
          PROVISION_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROVISION_DIR"
          echo "$PROVISION_BASE64" | base64 --decode > "$PROVISION_DIR/profile.mobileprovision"

          echo "✅ Code signing configured"

      - name: Archive for device
        if: github.event.inputs.build_type == 'signed (Device .ipa)'
        working-directory: CoinFlow
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath ./build/CoinFlow.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISION_PROFILE_NAME }}"

      - name: Export IPA
        if: github.event.inputs.build_type == 'signed (Device .ipa)'
        working-directory: CoinFlow
        run: |
          # Generate export options plist
          /usr/libexec/PlistBuddy -c "Add method string ad-hoc" exportOptions.plist
          /usr/libexec/PlistBuddy -c "Add teamID string ${{ secrets.APPLE_TEAM_ID }}" exportOptions.plist

          xcodebuild -exportArchive \
            -archivePath ./build/CoinFlow.xcarchive \
            -exportPath ./output \
            -exportOptionsPlist exportOptions.plist

          echo "✅ IPA exported"

      # ── Upload artifact ──────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoinFlow-${{ github.event.inputs.build_type || 'unsigned' }}-${{ github.run_number }}
          path: CoinFlow/output/*
          retention-days: 7
