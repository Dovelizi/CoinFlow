name: Build iOS App

on:
  push:
    branches: [feature/animal-island-theme]
  workflow_dispatch:
    inputs:
      build_type:
        description: '签名方式'
        required: true
        type: choice
        options:
          - unsigned（下载后用 Sideloadly 免费签）
          - signed（GitHub Secrets 自动签）
        default: 'unsigned（下载后用 Sideloadly 免费签）'
      xcode_version:
        description: 'Xcode 版本（留空=自动）'
        required: false
        type: string
        default: ''

env:
  PROJECT: CoinFlow.xcodeproj
  SCHEME: CoinFlow

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 选择 Xcode 版本
      - name: Select Xcode version
        run: |
          if [ -n "${{ github.event.inputs.xcode_version }}" ]; then
            XCODE_PATH="/Applications/Xcode_${{ github.event.inputs.xcode_version }}.app"
            if [ -d "$XCODE_PATH" ]; then
              sudo xcode-select -s "$XCODE_PATH"
            fi
          else
            XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -1)
            if [ -n "$XCODE26" ]; then
              sudo xcode-select -s "$XCODE26"
            fi
          fi
          xcodebuild -version

      # 生成项目
      - name: Generate Xcode project
        working-directory: CoinFlow
        run: python3 scripts/gen_xcodeproj.py

      # 安装依赖
      - name: Resolve Swift packages
        working-directory: CoinFlow
        run: |
          xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      # ==============================================
      # 无签名构建（Sideloadly 专用）
      # ==============================================
      - name: Archive unsigned
        if: github.event.inputs.build_type != 'signed（GitHub Secrets 自动签）'
        working-directory: CoinFlow
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath build/CoinFlow.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build/build.log

      # ==============================================
      # 签名模式（你不用管）
      # ==============================================
      - name: Install signing assets
        if: github.event.inputs.build_type == 'signed（GitHub Secrets 自动签）'
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/["]//g')
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISION_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"

      - name: Archive signed
        if: github.event.inputs.build_type == 'signed（GitHub Secrets 自动签）'
        working-directory: CoinFlow
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath build/CoinFlow.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISION_PROFILE_NAME }}"

      # ==============================================
      # 打包无签名 IPA（Sideloadly 兼容）
      # ==============================================
      - name: Package unsigned IPA
        if: github.event.inputs.build_type != 'signed（GitHub Secrets 自动签）'
        working-directory: CoinFlow
        run: |
          set -e

          # ── 1. 定位 .app ────────────────────────────────────────
          APP=$(find build/CoinFlow.xcarchive/Products/Applications -name "*.app" -type d | head -1)
          if [ ! -d "$APP" ]; then
            echo "❌ .app not found"
            exit 1
          fi
          echo "📦 $APP"

          # ── 2. 复制到 Payload ───────────────────────────────────
          rm -rf output
          mkdir -p output/Payload
          cp -Rp "$APP" output/Payload/

          # ── 3. 剥离签名残留 ──────────────────────────────────────
          find output/Payload -name "_CodeSignature"         -type d -exec rm -rf {} + 2>/dev/null || true
          find output/Payload -name "embedded.mobileprovision" -type f -delete 2>/dev/null || true
          find output/Payload -name "CodeResources"           -type f -delete 2>/dev/null || true

          # ── 4. Metadata.appintents → Payload 层 ────────────────
          SRC="$APP/Metadata.appintents"
          DST="output/Payload/Metadata.appintents"

          if [ -d "$SRC" ] && [ -f "$SRC/Info.plist" ]; then
            cp -Rp "$SRC" "$DST"
            echo "✅ Metadata.appintents (from .app)"
          elif [ -d "$SRC" ]; then
            cp -Rp "$SRC" "$DST"
            rm -f "$DST/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleDevelopmentRegion string en"                "$DST/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundleDisplayName string AppIntents"              "$DST/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundleExecutable string AppIntents"               "$DST/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundleIdentifier string com.coinflow.intents"     "$DST/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundleInfoDictionaryVersion string 6.0"           "$DST/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundleName string AppIntents"                     "$DST/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundlePackageType string BNDL"                    "$DST/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundleShortVersionString string 1.0"              "$DST/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundleVersion string 1"                           "$DST/Info.plist" 2>/dev/null || true
            plutil -convert xml1 "$DST/Info.plist" 2>/dev/null || true
            echo "⚠️  Metadata.appintents Info.plist 补全"
          else
            mkdir -p "$DST"
            /usr/libexec/PlistBuddy -c "Add CFBundleDevelopmentRegion string en"                "$DST/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleDisplayName string AppIntents"              "$DST/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleExecutable string AppIntents"               "$DST/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleIdentifier string com.coinflow.intents"     "$DST/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleInfoDictionaryVersion string 6.0"           "$DST/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleName string AppIntents"                     "$DST/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundlePackageType string BNDL"                    "$DST/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleShortVersionString string 1.0"              "$DST/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleVersion string 1"                           "$DST/Info.plist"
            plutil -convert xml1 "$DST/Info.plist"
            echo "⚠️  Metadata.appintents 占位生成（.app 内无此目录）"
          fi

          # ── 5. SwiftSupport ──────────────────────────────────────
          if [ -d "build/CoinFlow.xcarchive/SwiftSupport" ]; then
            cp -R build/CoinFlow.xcarchive/SwiftSupport output/SwiftSupport
          else
            SWIFT_DIR="$(dirname "$(xcrun --sdk iphoneos --show-sdk-path)")/../../Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos"
            if [ -d "$SWIFT_DIR" ]; then
              mkdir -p output/SwiftSupport/iphoneos
              cp "$SWIFT_DIR"/*.dylib output/SwiftSupport/iphoneos/ 2>/dev/null || true
            fi
          fi

          # ── 6. 打包 (zip store, 无压缩避免兼容性问题) ────────
          cd output
          if [ -d "SwiftSupport" ]; then
            zip -r -0 CoinFlow-unsigned.ipa Payload/ SwiftSupport/
          else
            zip -r -0 CoinFlow-unsigned.ipa Payload/
          fi

          # ── 7. 验证 ─────────────────────────────────────────────
          echo ""
          if unzip -l CoinFlow-unsigned.ipa | grep -q "Payload/Metadata.appintents/Info.plist"; then
            echo "✅ Payload/Metadata.appintents/Info.plist 已就位"
          else
            echo "❌ Payload/Metadata.appintents/Info.plist 缺失 — Sideloadly 会失败"
            exit 1
          fi
          echo "✅ IPA 就绪: $(du -sh CoinFlow-unsigned.ipa | cut -f1)"

      - name: Export signed IPA
        if: github.event.inputs.build_type == 'signed（GitHub Secrets 自动签）'
        working-directory: CoinFlow
        run: |
          /usr/libexec/PlistBuddy -c "Add method string ad-hoc" exportOptions.plist
          /usr/libexec/PlistBuddy -c "Add teamID string ${{ secrets.APPLE_TEAM_ID }}" exportOptions.plist
          xcodebuild -exportArchive -archivePath build/CoinFlow.xcarchive -exportPath output -exportOptionsPlist exportOptions.plist

      # 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoinFlow-${{ github.run_number }}
          path: CoinFlow/output/*
          retention-days: 7