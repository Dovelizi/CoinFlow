name: Build iOS App

on:
  push:
    branches: [feature/animal-island-theme]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -1)
          if [ -n "$XCODE26" ]; then
            sudo xcode-select -s "$XCODE26"
          fi
          xcodebuild -version

      - name: Generate Xcode project
        working-directory: CoinFlow
        run: python3 scripts/gen_xcodeproj.py

      - name: Resolve Swift packages
        working-directory: CoinFlow
        run: |
          xcodebuild -resolvePackageDependencies \
            -project CoinFlow.xcodeproj \
            -scheme CoinFlow

      - name: Build iOS App
        uses: yukiarrr/ios-build-action@v1.3.1
        with:
          project: "CoinFlow/CoinFlow.xcodeproj"
          scheme: "CoinFlow"
          configuration: "Release"
          export-method: "development"
          code-sign-identity: "-"
          signing-certificate: ""
          provisioning-profile: ""
          output-path: "CoinFlow/output"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CoinFlow-${{ github.run_number }}
          path: CoinFlow/output/*
          retention-days: 7
