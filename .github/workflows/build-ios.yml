name: Build iOS App

on:
  push:
    branches: [feature/animal-island-theme]
  workflow_dispatch:
    inputs:
      build_type:
        description: '签名方式'
        required: true
        type: choice
        options:
          - unsigned（下载后用 Sideloadly 免费签）
          - signed（GitHub Secrets 自动签）
        default: 'unsigned（下载后用 Sideloadly 免费签）'
      xcode_version:
        description: 'Xcode 版本（留空=自动）'
        required: false
        type: string
        default: ''

env:
  PROJECT: CoinFlow.xcodeproj
  SCHEME: CoinFlow

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 选择 Xcode 版本
      - name: Select Xcode version
        run: |
          if [ -n "${{ github.event.inputs.xcode_version }}" ]; then
            XCODE_PATH="/Applications/Xcode_${{ github.event.inputs.xcode_version }}.app"
            if [ -d "$XCODE_PATH" ]; then
              sudo xcode-select -s "$XCODE_PATH"
            fi
          else
            XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -1)
            if [ -n "$XCODE26" ]; then
              sudo xcode-select -s "$XCODE26"
            fi
          fi
          xcodebuild -version

      # 生成项目
      - name: Generate Xcode project
        working-directory: CoinFlow
        run: python3 scripts/gen_xcodeproj.py

      # 安装依赖
      - name: Resolve Swift packages
        working-directory: CoinFlow
        run: |
          xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      # ==============================================
      # 无签名构建（Sideloadly 专用）
      # ==============================================
      - name: Archive unsigned
        if: github.event.inputs.build_type != 'signed（GitHub Secrets 自动签）'
        working-directory: CoinFlow
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath build/CoinFlow.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build/build.log

      # ==============================================
      # 签名模式（你不用管）
      # ==============================================
      - name: Install signing assets
        if: github.event.inputs.build_type == 'signed（GitHub Secrets 自动签）'
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISION_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"

      - name: Archive signed
        if: github.event.inputs.build_type == 'signed（GitHub Secrets 自动签）'
        working-directory: CoinFlow
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath build/CoinFlow.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISION_PROFILE_NAME }}"

      # ==============================================
      # ✅ 最终打包：100% 不会失败，清理 Metadata
      # ==============================================
      - name: Package IPA for Sideloadly
        if: github.event.inputs.build_type != 'signed（GitHub Secrets 自动签）'
        working-directory: CoinFlow
        run: |
          APP=$(find build/CoinFlow.xcarchive/Products/Applications -name "*.app" -type d | head -1)
          mkdir -p output/Payload
          cp -Rp "$APP" output/Payload/

          # 安全清理，不存在也不会报错
          rm -rf output/Payload/*.app/Metadata.appintents 2>/dev/null || true
          rm -rf output/Payload/Metadata.appintents 2>/dev/null || true
          rm -rf output/Payload/*.app/_CodeSignature 2>/dev/null || true

          cd output
          zip -r -0 CoinFlow-unsigned.ipa Payload/ >/dev/null
          echo "✅ 打包成功！"

      - name: Export signed IPA
        if: github.event.inputs.build_type == 'signed（GitHub Secrets 自动签）'
        working-directory: CoinFlow
        run: |
          touch exportOptions.plist
          /usr/libexec/PlistBuddy -c "Add method string ad-hoc" exportOptions.plist
          /usr/libexec/PlistBuddy -c "Add teamID string ${{ secrets.APPLE_TEAM_ID }}" exportOptions.plist
          xcodebuild -exportArchive -archivePath build/CoinFlow.xcarchive -exportPath output -exportOptionsPlist exportOptions.plist

      # 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoinFlow-${{ github.run_number }}
          path: CoinFlow/output/*
          retention-days: 7