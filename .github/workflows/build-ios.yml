name: Build iOS App

on:
  push:
    branches: [feature/animal-island-theme]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -1)
          if [ -n "$XCODE26" ]; then
            sudo xcode-select -s "$XCODE26"
          fi
          xcodebuild -version

      - name: Generate Xcode project
        working-directory: CoinFlow
        run: python3 scripts/gen_xcodeproj.py

      - name: Resolve Package Dependencies
        working-directory: CoinFlow
        run: |
          xcodebuild -resolvePackageDependencies \
            -project CoinFlow.xcodeproj \
            -scheme CoinFlow

      - name: Build for iOS Device (Unsigned)
        working-directory: CoinFlow
        run: |
          xcodebuild build \
            -project CoinFlow.xcodeproj \
            -scheme CoinFlow \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Find .app and create IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "CoinFlow.app" -type d | head -1)
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found in DerivedData"
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -5 || true
            exit 1
          fi
          echo "App: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r CoinFlow.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CoinFlow-iOS
          path: build/CoinFlow.ipa
          retention-days: 7
